{% extends "marketplace/base.html" %}
{% block title %}Chat{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">AI Chat Assistant</div>
      <div class="card-body p-3" style="height:400px; overflow-y:auto; background:#f8f9fa;">
        {% for msg in chat_history %}
          {% if msg.sender == "user" %}
            <div class="text-end mb-2">
              <span class="badge bg-secondary">You</span>
              <div class="alert alert-primary d-inline-block py-1 px-2">{{ msg.text }}</div>
            </div>
          {% else %}
            <div class="text-start mb-2">
              <span class="badge bg-info text-dark">AI</span>
              <div class="alert alert-light border d-inline-block py-1 px-2">{{ msg.text }}</div>
            </div>
          {% endif %}
        {% endfor %}
      </div>
      <div class="card-footer bg-light">
        <form method="post" class="d-flex">
          {% csrf_token %}
          <input type="text" name="message" class="form-control me-2" placeholder="Type a message..." autocomplete="off">
          <button type="submit" class="btn btn-primary">Send</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  // Auto-scroll to the bottom of the chat body
  document.addEventListener("DOMContentLoaded", function() {
    var chatBody = document.querySelector(".card-body");
    chatBody.scrollTop = chatBody.scrollHeight;
  });
</script>

{% endblock %}
