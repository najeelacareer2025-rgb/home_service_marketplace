{% extends 'marketplace/base.html' %}
{% load static %}

{% block title %}Signup{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
    <div class="card shadow-lg p-4" style="max-width:450px; width:100%;">
        <div class="text-center mb-4">
            <h4 class="fw-bold">Create Your Account</h4>
            <p class="text-muted">Join Urban Home Services for a better experience</p>
        </div>

        <form method="post" action="{% url 'register' %}">
            {% csrf_token %}
            
            <!-- First Name -->
            <div class="mb-3">
                <label for="first_name" class="form-label fw-semibold">First name</label>
                <input type="text" class="form-control" id="first_name" name="first_name" placeholder="Enter your first name" required>
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label for="last_name" class="form-label fw-semibold">Last name</label>
                <input type="text" class="form-control" id="last_name" name="last_name" placeholder="Enter your last name" required>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <!-- Confirm Password -->
            <div class="mb-3">
                <label for="confirm_password" class="form-label fw-semibold">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
            </div>

            <!-- Role Selection -->
            <div class="mb-3">
                <label for="role" class="form-label fw-semibold">Select Role</label>
                <select class="form-select" id="role" name="role" required>
                    <option value="" disabled selected>Choose your role</option>
                    <option value="admin">Admin</option>
                    <option value="staff">Staff</option>
                    <option value="customer">Customer</option>
                </select>
            </div>

            <!-- Signup Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">SIGNUP</button>
            </div>
        </form>

        <p class="mt-3 text-center">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
