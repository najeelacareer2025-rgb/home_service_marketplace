{% extends 'marketplace/base.html' %}
{% load static %}

{% block title %}User Profile{% endblock %}

{% block content %}
<div class="card mb-4 text-center shadow-sm">
    <div class="card-body">
        {% if user.profile_pic %}
            <img src="{{ user.profile_pic.url }}" class="rounded-circle mb-3"
                 style="width:120px; height:120px; object-fit:cover;">
        {% else %}
            <img src="{% static 'marketplace/images/profile.webp' %}" class="rounded-circle mb-3"
                 style="width:120px; height:120px; object-fit:cover;">
        {% endif %}

        <h4 class="fw-bold">{{ user.username }}</h4>
        <p class="text-muted">{{ user.email }}</p>

        <!-- Pen icon for edit -->
        <a href="{% url 'edit_profile' %}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-pencil"></i> Edit Profile
        </a>
    </div>
</div>
{% endblock %}
